name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to tap (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve tag and tarball
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with v (example: v0.1.0)." >&2
            exit 1
          fi

          # Homebrew package source is the minimal runtime asset from the public release.
          ASSET_NAME="transcodetagsmp3-${TAG}.tar.gz"
          TARBALL_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET_NAME}"
          curl -fsSL -o package.tar.gz "$TARBALL_URL"
          SHA256="$(sha256sum package.tar.gz | awk '{print $1}')"

          {
            echo "tag=$TAG"
            echo "tarball_url=$TARBALL_URL"
            echo "sha256=$SHA256"
          } >> "$GITHUB_OUTPUT"

      - name: Update formula URL and sha256
        env:
          TARBALL_URL: ${{ steps.meta.outputs.tarball_url }}
          RELEASE_SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          FORMULA="Formula/transcodetagsmp3.rb"
          if [ ! -f "$FORMULA" ]; then
            echo "Missing formula: $FORMULA" >&2
            exit 1
          fi

          python3 - <<'PY'
          import os
          from pathlib import Path

          formula = Path("Formula/transcodetagsmp3.rb")
          tarball_url = os.environ["TARBALL_URL"]
          release_sha = os.environ["RELEASE_SHA256"]

          lines = formula.read_text(encoding="utf-8").splitlines()
          out = []
          in_mutagen_block = False
          url_updated = False
          sha_updated = False

          for line in lines:
              stripped = line.strip()

              if stripped.startswith('resource "mutagen"'):
                  in_mutagen_block = True

              if not in_mutagen_block and not url_updated and stripped.startswith("url "):
                  indent = line[: len(line) - len(line.lstrip())]
                  line = f'{indent}url "{tarball_url}"'
                  url_updated = True
              elif (
                  not in_mutagen_block
                  and not sha_updated
                  and stripped.startswith("sha256 ")
              ):
                  indent = line[: len(line) - len(line.lstrip())]
                  line = f'{indent}sha256 "{release_sha}"'
                  sha_updated = True

              out.append(line)

              if in_mutagen_block and stripped == "end":
                  in_mutagen_block = False

          if not url_updated or not sha_updated:
              raise SystemExit("Failed to update formula url/sha256 fields")

          formula.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

      - name: Commit and push tap update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/transcodetagsmp3.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          git commit -m "transcodetagsmp3 ${{ steps.meta.outputs.tag }}"
          git push origin HEAD

      - name: Summary
        run: |
          {
            echo "### Tap Update Completed"
            echo "- Tap repo: https://github.com/${GITHUB_REPOSITORY}"
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Formula URL: \`${{ steps.meta.outputs.tarball_url }}\`"
            echo "- Formula SHA256: \`${{ steps.meta.outputs.sha256 }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
