name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  release:
    needs: test
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with v (example: v0.1.0)." >&2
            exit 1
          fi

          # Homebrew must use the public repo tarball, not private source repo.
          TARBALL_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL -o source.tar.gz "$TARBALL_URL"
          SHA256="$(sha256sum source.tar.gz | awk '{print $1}')"

          {
            echo "tag=$TAG"
            echo "tarball_url=$TARBALL_URL"
            echo "sha256=$SHA256"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Release Metadata"
            echo "- Public repo: https://github.com/${GITHUB_REPOSITORY}"
            echo "- Tarball URL: \`$TARBALL_URL\`"
            echo "- SHA256: \`$SHA256\`"
            echo ""
            echo "Private source repo remains separate and is not used for Homebrew tarballs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          Homebrew release metadata for \`${{ steps.meta.outputs.tag }}\`.

          - Tarball URL: \`${{ steps.meta.outputs.tarball_url }}\`
          - SHA256: \`${{ steps.meta.outputs.sha256 }}\`

          Use this SHA for the top-level formula \`sha256\` in \`Formula/transcodetagsmp3.rb\`.
          EOF

      - name: Create or update GitHub release
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --repo "${GITHUB_REPOSITORY}" --title "$TAG" --notes-file release-notes.md
          fi

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ steps.meta.outputs.tag }}
          path: release-notes.md
